{% extends "base.html" %}
{% block title %}价位告警 · FinHelper{% endblock %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='price-alerts.css') }}">

<main class="layout price-alerts-page">
  <section class="panel price-alerts-hero">
    <div class="price-alerts-hero-inner">
      <div>
        <p class="eyebrow">Price Alerts</p>
        <h2>价位告警管理</h2>
        <p class="hint">汇总所有活跃主题下的美股价位提醒；触发飞书后按设定间隔重复推送。</p>
        <div class="price-alerts-summary" id="alertsSummary">
          <span class="summary-pill"><strong id="summaryAlertCount">--</strong> 条告警</span>
          <span class="summary-pill"><strong id="summaryTickerCount">--</strong> 个标的</span>
          <span class="summary-pill"><strong id="summaryThemeCount">--</strong> 个主题</span>
          <span class="summary-pill triggered"><strong id="summaryTriggeredCount">--</strong> 条已触达</span>
        </div>
      </div>
      <div class="price-alerts-hero-actions">
        <a href="{{ url_for('investments.index') }}" class="secondary-btn">← 主题列表</a>
        <button type="button" class="primary-btn" id="refreshAlertsBtn">刷新</button>
      </div>
    </div>
  </section>

  <section class="panel price-alerts-settings">
    <h3 class="price-alerts-settings-title">重复提醒设置</h3>
    <form id="cooldownSettingsForm" class="price-alerts-settings-form">
      <label>
        <span>触发后重复间隔（小时）</span>
        <input type="number" name="cooldown_hours" id="cooldownHours"
          min="1" max="168" value="{{ price_alert_settings.cooldown_hours }}" required>
        <small>同一价位告警推送飞书后，需间隔 N 小时才会再次提醒</small>
      </label>
      <button type="submit" class="primary-btn">保存设置</button>
    </form>
    <p class="price-alerts-settings-status" id="settingsStatus"></p>
  </section>

  <section class="panel price-alerts-toolbar-panel">
    <div class="price-alerts-toolbar">
      <label class="price-alerts-search">
        <span>筛选</span>
        <input type="search" id="alertFilter" placeholder="代码或主题名，如 AAPL">
      </label>
      <div class="price-alerts-bulk">
        <label class="price-alerts-select-all">
          <input type="checkbox" id="selectAllAlerts">
          <span>全选</span>
        </label>
        <button type="button" class="danger-btn" id="deleteSelectedBtn" disabled>删除所选</button>
      </div>
    </div>
  </section>

  <div id="alertsLoading" class="price-alerts-loading panel">
    <div class="loading-spinner"></div>
    <p>正在加载告警列表…</p>
  </div>

  <div id="alertsEmpty" class="price-alerts-empty panel" hidden>
    <h3>暂无价位告警</h3>
    <p>请在投资主题详情页为监控标的添加价位提醒。</p>
    <a href="{{ url_for('investments.index') }}" class="primary-btn">去主题列表</a>
  </div>

  <section id="alertsTablePanel" class="panel price-alerts-table-panel" hidden>
    <div class="price-alerts-table-wrap">
      <table class="price-alerts-table" id="alertsTable">
        <thead>
          <tr>
            <th class="col-check"></th>
            <th>标的</th>
            <th>方向</th>
            <th>目标价</th>
            <th>现价</th>
            <th>主题</th>
            <th>备注</th>
            <th>上次触发</th>
            <th class="col-actions">操作</th>
          </tr>
        </thead>
        <tbody id="alertsTableBody"></tbody>
      </table>
    </div>
  </section>
</main>

<script>
  window.PRICE_ALERTS_PAGE = {
    listUrl: {{ url_for('investments.price_alerts_list_api')|tojson }},
    settingsUrl: {{ url_for('investments.price_alerts_settings_api')|tojson }},
    deleteUrl: {{ url_for('investments.price_alerts_delete_api')|tojson }},
    themeDetailPattern: {{ url_for('investments.detail', theme_id=0)|tojson }}.replace('/0', '/'),
    initialSettings: {{ price_alert_settings|tojson }},
  };
</script>
<script src="{{ url_for('static', filename='price-alerts.js') }}"></script>
{% endblock %}
